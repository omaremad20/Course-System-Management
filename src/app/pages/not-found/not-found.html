<div class="h-full flex items-center justify-center">
  <section class="text-center">
    <p class="text-7xl font-extrabold tracking-wider">404</p>

    <div class="space-y-4 flex flex-col items-center">
      <h1 class="text-3xl font-bold">Page Not Found</h1>

      <p class="text-gray-500">Sorry, the page you are looking for does not exist.</p>

      <a
        (click)="goBack()"
        class="bg-black flex items-center gap-2 justify-center text-white cursor-pointer hover:text-white/90 hover:bg-black/90 uppercase font-medium tracking-widest transition-all duration-200 px-5 py-4 rounded-full shadow mb-10 group"
      >
        <mat-icon class="transition-transform duration-200 group-hover:-translate-x-1">
          west
        </mat-icon>

        <span>Go Back</span>
      </a>
    </div>
  </section>
</div>
