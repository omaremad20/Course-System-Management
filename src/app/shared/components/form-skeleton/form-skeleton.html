<div class="grid grid-cols-1 gap-4 md:grid-cols-2" aria-busy="true" aria-label="Loading form">
  @for (item of fields; track item) {
    <div
      class="h-14 rounded-md animate-pulse bg-(--mat-sys-surface-variant)"
      [class.md:col-span-2]="item === 'full'"
    ></div>
  }
  <div class="md:col-span-2 flex gap-3 mt-2">
    <div class="h-10 w-24 rounded-md animate-pulse bg-(--mat-sys-surface-variant)"></div>
    <div class="h-10 w-24 rounded-md animate-pulse bg-(--mat-sys-surface-variant)"></div>
  </div>
</div>
